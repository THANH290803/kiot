name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

  # ── Chỉ chạy sau push vào develop ──────────────────────────────────────
  verify-dev:
    name: Verify Dev
    needs: build-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEV_BACKEND_URL:  https://kiot-dev.onrender.com
      DEV_FRONTEND_URL: https://kiot-dev.vercel.app

    steps:
      - name: Wait for deployment
        run: sleep 90

      - name: Check dev backend health
        shell: bash
        run: |
          set -euo pipefail
          target="${DEV_BACKEND_URL}/health"
          max_attempts=5
          attempt=1
          passed=false

          echo "Dev backend health check → ${target}"
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Attempt ${attempt}/${max_attempts}"
            curl_exit=0
            status=$(curl -sS --max-time 20 \
              -o /tmp/body.txt -w "%{http_code}" \
              "${target}" 2>/tmp/err.txt) || curl_exit=$?
            body=$(cat /tmp/body.txt 2>/dev/null || true)
            [ -n "$(cat /tmp/err.txt)" ] && echo "curl stderr: $(cat /tmp/err.txt)"
            echo "HTTP ${status:-no-response} | exit: ${curl_exit}"
            printf 'Body: %s\n' "${body:0:500}"

            if [ "${curl_exit}" -eq 0 ] && [ "${status}" = "200" ] && [[ "${body}" == *"ok"* ]]; then
              passed=true; break
            fi
            [ "${attempt}" -lt "${max_attempts}" ] && sleep 15
            attempt=$((attempt + 1))
          done

          "${passed}" && echo "Dev backend ✓" || { echo "::error::Dev backend failed."; exit 1; }

      - name: Check dev frontend
        shell: bash
        run: |
          set -euo pipefail
          target="${DEV_FRONTEND_URL}"
          echo "Dev frontend check → ${target}"

          curl_exit=0
          status=$(curl -sS --max-time 20 \
            -o /tmp/body.txt -w "%{http_code}" \
            "${target}" 2>/tmp/err.txt) || curl_exit=$?
          body=$(cat /tmp/body.txt 2>/dev/null || true)

          [ "${curl_exit}" -ne 0 ] && { echo "::error::Dev frontend unreachable."; exit 1; }
          { [ "${status}" -lt 200 ] || [ "${status}" -ge 400 ]; } && { echo "::error::HTTP ${status}."; exit 1; }
          [[ "${body}" != *"<html"* ]] && { echo "::error::Response is not HTML."; exit 1; }
          echo "Dev frontend ✓"