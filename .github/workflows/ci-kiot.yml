name: kiot-ci-cd

on:
push:
branches:
- develop
- main
pull_request:
branches:
- develop
- main

permissions:
contents: read

env:
DEV_BACKEND_URL: https://kiot-dev.onrender.com
DEV_FRONTEND_URL: https://kiot-dev.vercel.app
PROD_BACKEND_URL: https://kiot-7o5h.onrender.com
PROD_FRONTEND_URL: https://kiot-blush.vercel.app

concurrency:
group: ci-${{ github.workflow }}-${{ github.ref }}
cancel-in-progress: true

jobs:
build-test:
name: Build and Test
runs-on: ubuntu-latest
timeout-minutes: 20

```
steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"
      cache: npm
      cache-dependency-path: |
        package-lock.json
        backend/package-lock.json
        frontend/package-lock.json

  - name: Install dependencies
    run: npm ci

  - name: Run backend tests
    run: npm run test --workspace=backend

  - name: Build frontend
    run: npm run build --workspace=frontend
```

verify-dev:
name: Verify Development
needs: build-test
if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
runs-on: ubuntu-latest
timeout-minutes: 10

```
steps:
  - name: Wait for deployment
    run: sleep 90

  - name: Check backend health
    shell: bash
    run: |
      set -euo pipefail

      URL="${DEV_BACKEND_URL}/health"

      for i in 1 2 3 4 5
      do
        echo "Attempt $i"

        STATUS=$(curl -s -o response.txt -w "%{http_code}" "$URL" || true)
        BODY=$(cat response.txt || true)

        if [ "$STATUS" = "200" ] && [[ "$BODY" == *"ok"* ]]; then
          echo "Backend healthy"
          exit 0
        fi

        sleep 15
      done

      echo "::error::Backend health check failed"
      exit 1

  - name: Check frontend
    shell: bash
    run: |
      set -euo pipefail

      STATUS=$(curl -s -o response.txt -w "%{http_code}" "${DEV_FRONTEND_URL}" || true)
      BODY=$(cat response.txt || true)

      if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
        echo "::error::Frontend unavailable"
        exit 1
      fi

      if [[ "$BODY" != *"<html"* ]]; then
        echo "::error::Frontend response is not HTML"
        exit 1
      fi

      echo "Frontend healthy"
```

verify-production:
name: Verify Production
needs: build-test
if: github.event_name == 'push' && github.ref == 'refs/heads/main'
runs-on: ubuntu-latest
timeout-minutes: 10
environment: production

```
steps:
  - name: Wait for deployment
    run: sleep 90

  - name: Check backend health
    shell: bash
    run: |
      set -euo pipefail

      URL="${PROD_BACKEND_URL}/health"

      for i in 1 2 3 4 5
      do
        echo "Attempt $i"

        STATUS=$(curl -s -o response.txt -w "%{http_code}" "$URL" || true)
        BODY=$(cat response.txt || true)

        if [ "$STATUS" = "200" ] && [[ "$BODY" == *"ok"* ]]; then
          echo "Backend healthy"
          exit 0
        fi

        sleep 15
      done

      echo "::error::Backend health check failed"
      exit 1

  - name: Check frontend
    shell: bash
    run: |
      set -euo pipefail

      STATUS=$(curl -s -o response.txt -w "%{http_code}" "${PROD_FRONTEND_URL}" || true)
      BODY=$(cat response.txt || true)

      if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
        echo "::error::Frontend unavailable"
        exit 1
      fi

      if [[ "$BODY" != *"<html"* ]]; then
        echo "::error::Frontend response is not HTML"
        exit 1
      fi

      echo "Frontend healthy"

  - name: Deployment summary
    run: |
      {
        echo "## Production Deployment Successful"
        echo ""
        echo "| Item | Value |"
        echo "|------|-------|"
        echo "| Commit | ${{ github.sha }} |"
        echo "| Triggered By | @${{ github.actor }} |"
        echo "| Backend | ${{ env.PROD_BACKEND_URL }} |"
        echo "| Frontend | ${{ env.PROD_FRONTEND_URL }} |"
      } >> "$GITHUB_STEP_SUMMARY"
```
