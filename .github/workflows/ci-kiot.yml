name: kiot-ci-cd

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

env:
  DEV_BACKEND_URL:   https://kiot-dev.onrender.com
  DEV_FRONTEND_URL:  https://kiot-dev.vercel.app
  PROD_BACKEND_URL:  https://kiot-7o5h.onrender.com
  PROD_FRONTEND_URL: https://kiot-blush.vercel.app

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Build & Test ───────────────────────────────────────────────────
  # Chạy trên mọi push và PR
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

  # ── 2. Verify Dev ────────────────────────────────────────────────────
  # Chỉ chạy sau push vào develop
  verify-dev:
    name: Verify Dev
    needs: ci
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for deployment
        run: sleep 90

      - name: Check dev backend health
        shell: bash
        run: |
          set -euo pipefail
          target="${DEV_BACKEND_URL}/health"
          max_attempts=5; attempt=1; passed=false

          echo "Dev backend → ${target}"
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Attempt ${attempt}/${max_attempts}"
            curl_exit=0
            status=$(curl -sS --max-time 20 \
              -o /tmp/body.txt -w "%{http_code}" \
              "${target}" 2>/tmp/err.txt) || curl_exit=$?
            body=$(cat /tmp/body.txt 2>/dev/null || true)
            [ -s /tmp/err.txt ] && echo "curl stderr: $(cat /tmp/err.txt)"
            echo "HTTP ${status:-no-response} | exit: ${curl_exit}"
            printf 'Body: %s\n' "${body:0:500}"

            if [ "${curl_exit}" -eq 0 ] && [ "${status}" = "200" ] && [[ "${body}" == *"ok"* ]]; then
              passed=true; break
            fi
            [ "${attempt}" -lt "${max_attempts}" ] && sleep 15
            attempt=$((attempt + 1))
          done

          "${passed}" && echo "Dev backend ✓" || { echo "::error::Dev backend failed."; exit 1; }

      - name: Check dev frontend
        shell: bash
        run: |
          set -euo pipefail
          target="${DEV_FRONTEND_URL}"
          echo "Dev frontend → ${target}"

          curl_exit=0
          status=$(curl -sS --max-time 20 \
            -o /tmp/body.txt -w "%{http_code}" \
            "${target}" 2>/tmp/err.txt) || curl_exit=$?
          body=$(cat /tmp/body.txt 2>/dev/null || true)
          echo "HTTP ${status:-no-response} | exit: ${curl_exit}"

          [ "${curl_exit}" -ne 0 ] && { echo "::error::Dev frontend unreachable."; exit 1; }
          { [ "${status}" -lt 200 ] || [ "${status}" -ge 400 ]; } && { echo "::error::HTTP ${status}."; exit 1; }
          [[ "${body}" != *"<html"* ]] && { echo "::error::Response is not HTML."; exit 1; }
          echo "Dev frontend ✓"

  # ── 3. Verify Production ─────────────────────────────────────────────
  # Chỉ chạy sau push vào main (tức là sau khi merge PR develop → main)
  verify-production:
    name: Verify Production
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Wait for deployment
        run: sleep 90

      - name: Check production backend health
        shell: bash
        run: |
          set -euo pipefail
          target="${PROD_BACKEND_URL}/health"
          max_attempts=5; attempt=1; passed=false

          echo "::group::Production backend → ${target}"
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Attempt ${attempt}/${max_attempts}"
            curl_exit=0
            status=$(curl -sS --max-time 20 \
              -o /tmp/body.txt -w "%{http_code}" \
              "${target}" 2>/tmp/err.txt) || curl_exit=$?
            body=$(cat /tmp/body.txt 2>/dev/null || true)
            [ -s /tmp/err.txt ] && echo "curl stderr: $(cat /tmp/err.txt)"
            echo "HTTP ${status:-no-response} | exit: ${curl_exit}"
            printf 'Body: %s\n' "${body:0:500}"

            if [ "${curl_exit}" -eq 0 ] && [ "${status}" = "200" ] && [[ "${body}" == *"ok"* ]]; then
              passed=true; break
            fi
            [ "${attempt}" -lt "${max_attempts}" ] && sleep 15
            attempt=$((attempt + 1))
          done
          echo "::endgroup::"

          "${passed}" && echo "Backend ✓" || { echo "::error::Backend health check failed."; exit 1; }

      - name: Check production frontend
        shell: bash
        run: |
          set -euo pipefail
          target="${PROD_FRONTEND_URL}"
          echo "::group::Production frontend → ${target}"

          curl_exit=0
          status=$(curl -sS --max-time 20 \
            -o /tmp/body.txt -w "%{http_code}" \
            "${target}" 2>/tmp/err.txt) || curl_exit=$?
          body=$(cat /tmp/body.txt 2>/dev/null || true)
          echo "HTTP ${status:-no-response} | exit: ${curl_exit}"
          echo "::endgroup::"

          [ "${curl_exit}" -ne 0 ] && { echo "::error::Production frontend unreachable."; exit 1; }
          { [ "${status}" -lt 200 ] || [ "${status}" -ge 400 ]; } && { echo "::error::HTTP ${status}."; exit 1; }
          [[ "${body}" != *"<html"* ]] && { echo "::error::Response is not HTML."; exit 1; }
          echo "Frontend ✓"

      - name: Deployment summary
        run: |
          echo "## Production Deployment ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Deployed at** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Backend** | ${{ env.PROD_BACKEND_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Frontend** | ${{ env.PROD_FRONTEND_URL }} |" >> "$GITHUB_STEP_SUMMARY"