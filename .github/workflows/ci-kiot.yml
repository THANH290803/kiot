name: KIOT CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main

env:
  DEV_BACKEND_URL: "https://kiot-dev.onrender.com"
  DEV_FRONTEND_URL: "https://kiot-dev.vercel.app"

  PROD_BACKEND_URL: "https://kiot-7o5h.onrender.com"
  PROD_FRONTEND_URL: "https://kiot-blush.vercel.app"

jobs:

  # =========================
  # BUILD PROJECT
  # =========================

  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install backend deps
        run: npm install --workspace=backend

      - name: Install frontend deps
        run: npm install --workspace=frontend

      - name: Run backend tests
        run: npm run test --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend


  # =========================
  # DEV DEPLOY CHECK
  # =========================

  check-dev:
    name: Verify DEV Deployment
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    steps:

      - name: Wait for Render & Vercel deploy
        run: sleep 90

      - name: Check DEV backend
        run: |
          RESPONSE=$(curl -s $DEV_BACKEND_URL/health || true)

          echo "Backend response:"
          echo $RESPONSE

          if [[ $RESPONSE == *"ok"* ]]; then
            echo "Backend DEV deploy success"
          else
            echo "Backend DEV deploy failed"
            exit 1
          fi

      - name: Check DEV frontend
        run: |
          RESPONSE=$(curl -s $DEV_FRONTEND_URL || true)

          if [[ $RESPONSE == *"<html"* ]]; then
            echo "Frontend DEV deploy success"
          else
            echo "Frontend DEV deploy failed"
            exit 1
          fi


  # =========================
  # PRODUCTION DEPLOY
  # =========================

  deploy-production:
    name: Deploy Production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:

      - name: Production deployment status
        run: |
          echo "=============================="
          echo "PRODUCTION DEPLOY READY"
          echo "Backend: $PROD_BACKEND_URL"
          echo "Frontend: $PROD_FRONTEND_URL"
          echo "Waiting for approval..."
          echo "=============================="