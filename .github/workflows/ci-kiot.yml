name: kiot-ci-cd

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

env:
  DEV_BACKEND_URL: https://kiot-dev.onrender.com
  DEV_FRONTEND_URL: https://kiot-dev.vercel.app
  PROD_BACKEND_URL: https://kiot-7o5h.onrender.com
  PROD_FRONTEND_URL: https://kiot-blush.vercel.app

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

  verify-dev:
    name: Dev Deployment
    needs: build-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wait for deployment
        run: sleep 90

      - name: Check dev backend health
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking dev backend: ${DEV_BACKEND_URL}/health"

          status=$(curl -sS -o /tmp/dev_backend_body.txt -w "%{http_code}" "${DEV_BACKEND_URL}/health")
          body=$(cat /tmp/dev_backend_body.txt)

          echo "HTTP status: ${status}"
          echo "Response body: ${body}"

          if [ "${status}" != "200" ]; then
            echo "Backend health check failed: expected HTTP 200, got ${status}"
            exit 1
          fi

          if [[ "${body}" != *"ok"* ]]; then
            echo "Backend health check failed: response does not contain 'ok'"
            exit 1
          fi

          echo "Dev backend check passed"

      - name: Check dev frontend
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking dev frontend: ${DEV_FRONTEND_URL}"

          status=$(curl -sS -o /tmp/dev_frontend_body.txt -w "%{http_code}" "${DEV_FRONTEND_URL}")
          body=$(cat /tmp/dev_frontend_body.txt)

          echo "HTTP status: ${status}"
          echo "Response body (first 300 chars):"
          echo "${body}" | head -c 300
          echo

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 400 ]; then
            echo "Frontend check failed: expected 2xx/3xx, got ${status}"
            exit 1
          fi

          if [[ "${body}" != *"<html"* ]]; then
            echo "Frontend check failed: response does not look like HTML"
            exit 1
          fi

          echo "Dev frontend check passed"

  verify-production:
    name: Production Deployment
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Wait for deployment
        run: sleep 90

      - name: Check production backend health
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking production backend: ${PROD_BACKEND_URL}/health"

          status=$(curl -sS -o /tmp/prod_backend_body.txt -w "%{http_code}" "${PROD_BACKEND_URL}/health")
          body=$(cat /tmp/prod_backend_body.txt)

          echo "HTTP status: ${status}"
          echo "Response body: ${body}"

          if [ "${status}" != "200" ]; then
            echo "Production backend health check failed: expected HTTP 200, got ${status}"
            exit 1
          fi

          if [[ "${body}" != *"ok"* ]]; then
            echo "Production backend health check failed: response does not contain 'ok'"
            exit 1
          fi

          echo "Production backend check passed"

      - name: Check production frontend
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking production frontend: ${PROD_FRONTEND_URL}"

          status=$(curl -sS -o /tmp/prod_frontend_body.txt -w "%{http_code}" "${PROD_FRONTEND_URL}")
          body=$(cat /tmp/prod_frontend_body.txt)

          echo "HTTP status: ${status}"
          echo "Response body (first 300 chars):"
          echo "${body}" | head -c 300
          echo

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 400 ]; then
            echo "Production frontend check failed: expected 2xx/3xx, got ${status}"
            exit 1
          fi

          if [[ "${body}" != *"<html"* ]]; then
            echo "Production frontend check failed: response does not look like HTML"
            exit 1
          fi

          echo "Production frontend check passed"
