name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Release note (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: false   # không cancel deploy đang chạy

env:
  PROD_BACKEND_URL:  https://kiot-7o5h.onrender.com
  PROD_FRONTEND_URL: https://kiot-blush.vercel.app

# ── Flow: ci → merge → verify ────────────────────────────────────────────
#
#   Nếu một job fail, bấm "Re-run failed jobs" trên GitHub UI
#   để chạy lại đúng job đó mà không chạy lại từ đầu.
#
# ─────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Build & Test ──────────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test --workspace=backend

      - name: Build frontend
        run: npm run build --workspace=frontend

  # ── 2. Merge develop → main ──────────────────────────────────────────
  merge:
    name: Merge develop → main
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate and merge
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main develop

          ahead=$(git rev-list --count origin/main..origin/develop)
          behind=$(git rev-list --count origin/develop..origin/main)

          echo "develop ahead of main : ${ahead}"
          echo "develop behind main   : ${behind}"

          if [ "${behind}" -gt 0 ]; then
            echo "::error::develop is ${behind} commit(s) behind main."
            echo "::error::Run: git checkout develop && git merge origin/main && git push"
            exit 1
          fi

          if [ "${ahead}" -eq 0 ]; then
            echo "::notice::Nothing to merge — develop is already up to date with main."
            exit 0
          fi

          git checkout main
          git merge --ff-only origin/develop
          git push origin main
          echo "Merged develop → main ✓ (${ahead} commit(s))"

  # ── 3. Verify Production ─────────────────────────────────────────────
  verify:
    name: Verify Production
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Wait for deployment
        run: sleep 90

      - name: Check backend health
        shell: bash
        run: |
          set -euo pipefail
          target="${PROD_BACKEND_URL}/health"
          max_attempts=5
          attempt=1
          passed=false

          echo "::group::Production backend → ${target}"
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Attempt ${attempt}/${max_attempts}"
            curl_exit=0
            status=$(curl -sS --max-time 20 \
              -o /tmp/body.txt -w "%{http_code}" \
              "${target}" 2>/tmp/err.txt) || curl_exit=$?
            body=$(cat /tmp/body.txt 2>/dev/null || true)
            [ -n "$(cat /tmp/err.txt)" ] && echo "curl stderr: $(cat /tmp/err.txt)"
            echo "HTTP ${status:-no-response} | exit: ${curl_exit}"
            printf 'Body: %s\n' "${body:0:500}"

            if [ "${curl_exit}" -eq 0 ] && [ "${status}" = "200" ] && [[ "${body}" == *"ok"* ]]; then
              passed=true; break
            fi
            [ "${attempt}" -lt "${max_attempts}" ] && sleep 15
            attempt=$((attempt + 1))
          done
          echo "::endgroup::"

          "${passed}" && echo "Backend ✓" || { echo "::error::Backend health check failed."; exit 1; }

      - name: Check frontend
        shell: bash
        run: |
          set -euo pipefail
          target="${PROD_FRONTEND_URL}"
          echo "::group::Production frontend → ${target}"

          curl_exit=0
          status=$(curl -sS --max-time 20 \
            -o /tmp/body.txt -w "%{http_code}" \
            "${target}" 2>/tmp/err.txt) || curl_exit=$?
          body=$(cat /tmp/body.txt 2>/dev/null || true)
          echo "HTTP ${status:-no-response} | exit: ${curl_exit}"
          echo "::endgroup::"

          [ "${curl_exit}" -ne 0 ] && { echo "::error::Frontend unreachable."; exit 1; }
          { [ "${status}" -lt 200 ] || [ "${status}" -ge 400 ]; } && { echo "::error::HTTP ${status}."; exit 1; }
          [[ "${body}" != *"<html"* ]] && { echo "::error::Response is not HTML."; exit 1; }
          echo "Frontend ✓"

      - name: Deployment summary
        run: |
          echo "## Production Deployment ✓" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Deployed at** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | @${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ github.event.inputs.release_note }}" ]; then
            echo "| **Release note** | ${{ github.event.inputs.release_note }} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| **Backend** | ${{ env.PROD_BACKEND_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Frontend** | ${{ env.PROD_FRONTEND_URL }} |" >> "$GITHUB_STEP_SUMMARY"