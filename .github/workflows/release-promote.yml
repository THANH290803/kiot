name: release-promote

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Release note (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-promote-main
  cancel-in-progress: false

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main develop

          ahead_count=$(git rev-list --count origin/main..origin/develop)
          behind_count=$(git rev-list --count origin/develop..origin/main)

          echo "develop ahead of main: ${ahead_count}"
          echo "develop behind main: ${behind_count}"

          if [ "${ahead_count}" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new commits to release from develop to main."
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create or reuse PR develop -> main
        if: steps.diff.outputs.has_changes == 'true'
        id: pr
        uses: actions/github-script@v7
        env:
          RELEASE_NOTE: ${{ inputs.release_note }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:develop`;
            const base = "main";

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
              per_page: 100
            });

            if (existing.data.length > 0) {
              const pr = existing.data[0];
              core.setOutput("pr_number", String(pr.number));
              core.setOutput("pr_url", pr.html_url);
              core.setOutput("created", "false");
              core.info(`Reuse existing PR #${pr.number}: ${pr.html_url}`);
              return;
            }

            const date = new Date().toISOString().slice(0, 10);
            const releaseNote = (process.env.RELEASE_NOTE || "").trim();
            const noteBlock = releaseNote
              ? `## Release Note\n${releaseNote}\n\n`
              : "";

            const checklist = [
              "## Release Checklist",
              "- [ ] Backend tests passed",
              "- [ ] Frontend build passed",
              "- [ ] Database migration checked (if any)",
              "- [ ] Rollback plan ready",
              "- [ ] Smoke test after deploy"
            ].join("\n");
            const body = `${noteBlock}${checklist}`;

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title: `Release ${date}: develop -> main`,
              head: "develop",
              base: "main",
              body
            });

            core.setOutput("pr_number", String(created.data.number));
            core.setOutput("pr_url", created.data.html_url);
            core.setOutput("created", "true");
            core.info(`Created PR #${created.data.number}: ${created.data.html_url}`);

      - name: Summary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.diff.outputs.has_changes }}" != "true" ]; then
            echo "No release PR created because develop has no new commits."
            exit 0
          fi

          echo "Release PR URL: ${{ steps.pr.outputs.pr_url }}"
          echo "PR number: ${{ steps.pr.outputs.pr_number }}"
          echo "Created new PR: ${{ steps.pr.outputs.created }}"
